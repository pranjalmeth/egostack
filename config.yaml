download:
  resolution: 720
  format: mp4
  output_dir: data/raw

detection:
  confidence_threshold: 0.7
  model_complexity: 1        # 0=lite, 1=full

clipping:
  min_duration: 1.0           # seconds
  merge_gap: 0.5              # seconds — merge segments closer than this
  output_dir: data/clips

depth:
  model: depth_anything_v2     # or "midas"
  sample_rate: 30              # process every Nth frame (1 = all, 30 = ~1/sec)
  output_dir: data/depth
  save_visualization: true

trajectories:
  smooth: true                 # apply smoothing filter
  compute_velocity: true
  compute_acceleration: true
  output_dir: data/trajectories

export:
  formats: [json, csv]

# --- Enhanced SOTA robotics stages ---

hand_pose:
  enabled: true
  sample_rate: 1                 # process every Nth frame
  output_dir: data/hand_poses

object_detection:
  enabled: true
  sample_rate: 30                # process every Nth frame (~1/sec at 30fps)
  box_threshold: 0.3
  text_threshold: 0.25
  # text_prompts: [cup, bottle, tool, phone]  # null = use defaults
  output_dir: data/objects

segmentation:
  enabled: true
  sample_rate: 1
  model_size: small              # tiny, small, base_plus, large
  save_masks: true
  output_dir: data/segmentation

lerobot:
  enabled: true
  dataset_name: ego_hand_manipulation
  task_description: manipulation
  output_dir: data/lerobot

# --- Preprocessing ---

preprocessing:
  enabled: true
  target_width: 640               # 480p — ideal for robotics training data
  target_height: 480              # balances accuracy vs processing speed
  # target_fps: 30               # null = keep original fps
  output_dir: data/preprocessed

# --- Scene annotation ---

scene_annotation:
  enabled: true
  sample_rate: 30                 # annotate every Nth frame (~1/sec at 30fps)
  model_name: rule_based          # "blip2", "instructblip", or "rule_based"
  output_dir: data/scene_annotations

# --- Test / benchmark mode ---

test_mode:
  enabled: false
  max_frames: 900                 # ~30 seconds at 30fps
  render_samples: true            # generate annotated sample videos
  sample_output_dir: data/samples
